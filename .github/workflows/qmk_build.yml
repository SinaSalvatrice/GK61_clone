name: QMK RP2040 Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your keyboard repo
        uses: actions/checkout@v4
        with:
          path: keyboard_overlay

      - name: Checkout QMK Firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          ref: master
          path: qmk_firmware

      - name: Copy keyboard into QMK
        run: |
          cp -r keyboard_overlay/* qmk_firmware/keyboards/GK61_clone/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install QMK CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install qmk
          cd qmk_firmware
          qmk setup -y

      - name: Build firmware (RP2040)
        run: |
          cd qmk_firmware
          qmk compile -kb GK61_clone -km default

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-uf2
          path: "qmk_firmware/.build/*.uf2"
